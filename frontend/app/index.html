<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Task Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-brand">
        <span class="brand-sparkle">✨</span> Vunoh AI
      </div>
      <div class="nav-links">
        <button id="navChatBtn" class="nav-link active">Vunoh AI</button>
        <button id="navDashboardBtn" class="nav-link">Dashboard</button>
        <div class="nav-profile">
          <button id="profileBtn" class="profile-btn" aria-haspopup="true" aria-expanded="false">
            <svg id="profileAvatar" class="avatar" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Profile">
              <circle cx="16" cy="16" r="16" fill="#6366f1"/>
              <circle cx="16" cy="13" r="5" fill="#fff"/>
              <path d="M6 26c0-5.523 4.477-10 10-10s10 4.477 10 10" fill="#fff"/>
            </svg>
          </button>
          <div id="profileDropdown" class="profile-dropdown" role="menu" aria-hidden="true">
            <div class="profile-info">
              <div id="profileEmail" class="profile-email">—</div>
            </div>
            <ul class="profile-actions">
              <li><a href="/app/profile.html">Edit Profile</a></li>
              <li><button id="logoutBtn" class="btn btn-ghost">Logout</button></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    
    <!-- Chat View -->
    <section id="viewChat" class="view-section active-view">
      <header class="hero">
        <h1 class="hero-title">What will you have Vunoh assist you with today?</h1>
        
        <div id="chatCard" class="chat-card">
          <div id="chatWindow" class="chat-window" role="log" aria-live="polite"></div>

          <form id="chatForm" class="chat-form" autocomplete="off">
            <label for="chatInput" class="sr-only">Message</label>
            <div class="input-wrapper chat-input-wrapper">
              <button id="chatAIBtn" type="button" class="btn-ai-sparkle" aria-label="AI suggestion">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="ai-sparkle-icon">
                  <defs>
                    <linearGradient id="aiSparkleGrad" x1="15%" y1="15%" x2="85%" y2="85%">
                      <stop offset="0%" stop-color="#FACC15" />
                      <stop offset="35%" stop-color="#EF4444" />
                      <stop offset="65%" stop-color="#3B82F6" />
                      <stop offset="100%" stop-color="#22C55E" />
                    </linearGradient>
                  </defs>
                  <path d="M12 2C12 7.52 7.52 12 2 12C7.52 12 12 16.48 12 22C12 16.48 16.48 12 22 12C16.48 12 12 7.52 12 2Z" fill="url(#aiSparkleGrad)"/>
                </svg>
              </button>

              <textarea id="chatInput" rows="1" placeholder="Send money, hire services and verify documents..."></textarea>

              <div class="input-actions chat-input-actions">
                <button id="chatSend" type="submit" class="btn-chat-send" aria-label="Send">
                  <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                  </svg>
                </button>
              </div>
            </div>
          </form>

          <div id="chatFeedback" class="feedback" aria-live="polite"></div>
        </div>
      </header>
    </section>

    <!-- Dashboard View -->
    <section id="viewDashboard" class="view-section">
      <div class="dashboard">
        <div class="dashboard-header">
        <h2>Tasks</h2>
        <div id="tasksControls">
          <button id="refreshBtn" class="btn">Refresh</button>
        </div>
      </div>

      <div id="tasksContainer" class="tasks-container">
        <!-- tasks list injected here -->
      </div>

      <div id="emptyState" class="empty" hidden>
        <p>No tasks yet. Submit a request to create one.</p>
      </div>
      </div>
    </section>
  </main>

  <!-- Task detail modal -->
  <div id="taskModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <aside class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <h3 id="modalTitle">Task Overview</h3>
        <button id="closeModal" class="btn-icon" aria-label="Close">×</button>
      </header>
      
      <div class="modal-body">
        
        <!-- Left Column (Overview, Updates, Entities) -->
        <div class="modal-col modal-left">
          
          <section class="meta-card">
            <h4>Details</h4>
            <div class="meta-grid">
              <div class="meta-item">
                <span class="meta-label">Task Code</span>
                <span id="detailTaskCode" class="meta-value"></span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Assigned To</span>
                <span id="detailAssigned" class="meta-value"></span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Intent</span>
                <span id="detailIntent" class="badge"></span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Risk Level</span>
                <span id="detailRisk" class="risk"></span>
              </div>
              <div class="meta-item meta-full">
                <span class="meta-label">Created At</span>
                <span id="detailTimestamp" class="meta-value text-muted"></span>
              </div>
            </div>
          </section>

          <section class="entities">
            <h4>Identified Entities</h4>
            <dl id="entitiesList" class="kv"></dl>
          </section>

          <section class="status-update-card">
            <h4>Update Status</h4>
            <div class="status-row">
              <select id="statusSelect" class="status-select">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
              <button id="updateStatusBtn" class="pill pill-primary">Save changes</button>
            </div>
            <div id="statusFeedback" class="feedback" aria-live="polite"></div>
          </section>

        </div>

        <!-- Right Column (Steps, Comms) -->
        <div class="modal-col modal-right">
          
          <section class="steps-card">
            <h4>Execution Steps</h4>
            <ol id="stepsList" class="styled-list"></ol>
          </section>

          <section class="messages-card">
            <h4>Communications</h4>
            <div class="tabs" role="tablist">
              <button class="tab active" data-tab="whatsapp">WhatsApp</button>
              <button class="tab" data-tab="email">Email</button>
              <button class="tab" data-tab="sms">SMS</button>
            </div>
            <div class="tab-content" id="tabContent">
              <div data-panel="whatsapp" class="panel chat active"></div>
              <div data-panel="email" class="panel email-block"></div>
              <div data-panel="sms" class="panel sms-block"></div>
            </div>
          </section>

        </div>

      </div>
    </aside>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
